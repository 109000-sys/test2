<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成語閃卡遊戲</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&amp;family=Quicksand:wght@500;700&amp;display=swap" rel="stylesheet">
  <style>
    .flip-card { perspective: 1000px; }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1.5rem;
    }
    .flip-card-back { transform: rotateY(180deg); }
    .bounce { animation: bounce 0.5s ease; }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .star-pop { animation: starPop 0.4s ease forwards; }
    @keyframes starPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body class="h-full overflow-auto" style="font-family: 'Noto Sans TC', sans-serif;">
  <div id="app" class="h-full w-full flex flex-col items-center justify-center p-4" style="background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 30%, #f3e5f5 70%, #e8eaf6 100%);">
   <!-- Header -->
   <div class="text-center mb-4">
    <h1 id="app-title" class="text-3xl font-black mb-1" style="color: #e91e63;">🌸 成語閃卡 🌸</h1>
    <p id="encourage-text" class="text-sm" style="color: #9c27b0;">一起來學成語吧！加油～ 💪</p>
   </div><!-- Progress -->
   <div class="w-full max-w-sm mb-4">
    <div class="flex justify-between text-xs mb-1" style="color: #7b1fa2;">
     <span id="progress-label">進度</span> <span id="progress-count">0 / 0</span>
    </div>
    <div class="w-full h-3 rounded-full overflow-hidden" style="background: #f8bbd0;">
     <div id="progress-bar" class="h-full rounded-full transition-all duration-500" style="background: #e91e63; width: 0%;"></div>
    </div>
    <div id="stars-container" class="flex gap-1 mt-2 justify-center"></div>
   </div><!-- Empty State -->
   <div id="empty-state" class="text-center p-8 rounded-2xl max-w-sm w-full" style="background: rgba(255,255,255,0.7); display: none;">
    <p class="text-5xl mb-3">📚</p>
    <p class="font-bold text-lg mb-2" style="color: #e91e63;">還沒有閃卡喔！</p>
    <p class="text-sm mb-4" style="color: #9c27b0;">正在載入預設成語…</p><button id="seed-btn" class="px-4 py-2 rounded-full text-white font-bold text-sm" style="background: #e91e63;" onclick="seedDefaultCards()">新增預設成語</button>
   </div><!-- Flashcard -->
   <div id="card-area" class="w-full max-w-sm" style="display: none;">
    <div class="flip-card w-full cursor-pointer" id="flashcard" style="height: 240px;" onclick="flipCard()">
     <div class="flip-card-inner">
      <div class="flip-card-front flex flex-col items-center justify-center p-6 shadow-lg" style="background: linear-gradient(145deg, #ffffff, #fce4ec); border: 3px solid #f8bbd0;">
       <span class="text-4xl mb-2">🎴</span>
       <p id="card-front-text" class="text-3xl font-black text-center" style="color: #c2185b;"></p>
       <p class="text-xs mt-3 opacity-60" style="color: #9c27b0;">點我翻面 →</p>
      </div>
      <div class="flip-card-back flex flex-col items-center justify-center p-6 shadow-lg" style="background: linear-gradient(145deg, #f3e5f5, #ede7f6); border: 3px solid #ce93d8;">
       <p id="card-back-def" class="text-lg font-bold text-center mb-2" style="color: #6a1b9a;"></p>
       <p id="card-back-example" class="text-sm text-center opacity-80" style="color: #7b1fa2;"></p>
      </div>
     </div>
    </div><!-- Controls -->
    <div class="flex justify-center gap-3 mt-5">
     <button onclick="prevCard()" class="w-10 h-10 rounded-full flex items-center justify-center shadow" style="background: #fce4ec; color: #e91e63;"> <i data-lucide="chevron-left" style="width:20px;height:20px;"></i> </button> <button onclick="markKnown()" class="px-5 py-2 rounded-full text-white font-bold text-sm shadow" style="background: #ab47bc;"> ✓ 學會了！ </button> <button onclick="nextCard()" class="w-10 h-10 rounded-full flex items-center justify-center shadow" style="background: #fce4ec; color: #e91e63;"> <i data-lucide="chevron-right" style="width:20px;height:20px;"></i> </button>
    </div>
   </div><!-- Complete -->
   <div id="complete-state" class="text-center p-8 rounded-2xl max-w-sm w-full" style="background: rgba(255,255,255,0.8); display: none;">
    <p class="text-5xl mb-3">🎉</p>
    <p class="font-black text-2xl mb-2" style="color: #e91e63;">太棒了！全部學會了！</p><button onclick="resetProgress()" class="mt-3 px-5 py-2 rounded-full text-white font-bold text-sm" style="background: #ab47bc;">重新開始</button>
   </div>
  </div>
  <script>
    // State
    let cards = [];
    let currentIndex = 0;
    let knownSet = new Set();

    const defaultConfig = {
      app_title: '🌸 成語閃卡 🌸',
      encouragement_text: '一起來學成語吧！加油～ 💪',
      primary_color: '#e91e63',
      surface_color: '#ffffff',
      text_color: '#6a1b9a',
      accent_color: '#ab47bc',
      bg_color: '#fff0f5',
      font_family: 'Noto Sans TC',
      font_size: 16
    };

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = { ...defaultConfig, ...config };
        document.getElementById('app-title').textContent = c.app_title;
        document.getElementById('encourage-text').textContent = c.encouragement_text;
        document.getElementById('app').style.background = `linear-gradient(135deg, ${c.bg_color} 0%, #fce4ec 50%, #f3e5f5 100%)`;
        document.getElementById('app-title').style.color = c.primary_color;
        document.getElementById('card-front-text').style.color = c.primary_color;
        document.body.style.fontFamily = `${c.font_family}, 'Noto Sans TC', sans-serif`;
        document.getElementById('card-back-def').style.color = c.text_color;
        document.getElementById('card-back-example').style.color = c.text_color;
      },
      mapToCapabilities: (config) => {
        const c = { ...defaultConfig, ...config };
        const makeColor = (key) => ({
          get: () => c[key] || defaultConfig[key],
          set: (v) => { c[key] = v; window.elementSdk.setConfig({ [key]: v }); }
        });
        return {
          recolorables: [
            makeColor('bg_color'),
            makeColor('surface_color'),
            makeColor('text_color'),
            makeColor('primary_color'),
            makeColor('accent_color')
          ],
          borderables: [],
          fontEditable: {
            get: () => c.font_family || defaultConfig.font_family,
            set: (v) => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => c.font_size || defaultConfig.font_size,
            set: (v) => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        };
      },
      mapToEditPanelValues: (config) => {
        const c = { ...defaultConfig, ...config };
        return new Map([
          ['app_title', c.app_title],
          ['encouragement_text', c.encouragement_text]
        ]);
      }
    });

    // Data SDK
    const dataHandler = {
      onDataChanged(data) {
        cards = data;
        updateUI();
      }
    };

    (async () => {
      const result = await window.dataSdk.init(dataHandler);
      if (!result.isOk) console.error('Data SDK init failed');
      // Auto-seed on first load
      setTimeout(async () => {
        if (cards.length === 0) {
          await seedDefaultCards();
        }
      }, 500);
    })();

    function updateUI() {
      const emptyEl = document.getElementById('empty-state');
      const cardArea = document.getElementById('card-area');
      const completeEl = document.getElementById('complete-state');

      const remaining = cards.filter(c => !knownSet.has(c.__backendId));

      if (cards.length === 0) {
        emptyEl.style.display = 'block';
        cardArea.style.display = 'none';
        completeEl.style.display = 'none';
        return;
      }

      if (remaining.length === 0 && cards.length > 0) {
        emptyEl.style.display = 'none';
        cardArea.style.display = 'none';
        completeEl.style.display = 'block';
        updateProgress();
        return;
      }

      emptyEl.style.display = 'none';
      cardArea.style.display = 'block';
      completeEl.style.display = 'none';

      if (currentIndex >= remaining.length) currentIndex = 0;
      const card = remaining[currentIndex];
      document.getElementById('card-front-text').textContent = card.idiom || '';
      document.getElementById('card-back-def').textContent = card.definition || '';
      document.getElementById('card-back-example').textContent = card.example ? `例：${card.example}` : '';

      // Unflip
      document.getElementById('flashcard').classList.remove('flipped');
      updateProgress();
    }

    function updateProgress() {
      const total = cards.length;
      const known = knownSet.size;
      document.getElementById('progress-count').textContent = `${known} / ${total}`;
      const pct = total > 0 ? (known / total * 100) : 0;
      document.getElementById('progress-bar').style.width = `${pct}%`;

      // Stars
      const container = document.getElementById('stars-container');
      container.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const span = document.createElement('span');
        span.textContent = i < known ? '⭐' : '☆';
        span.className = i < known ? 'star-pop' : '';
        span.style.fontSize = '14px';
        container.appendChild(span);
      }
    }

    function flipCard() {
      const el = document.getElementById('flashcard');
      el.classList.toggle('flipped');
      el.querySelector('.flip-card-inner').classList.add('bounce');
      setTimeout(() => el.querySelector('.flip-card-inner').classList.remove('bounce'), 500);
    }

    function nextCard() {
      const remaining = cards.filter(c => !knownSet.has(c.__backendId));
      if (remaining.length === 0) return;
      currentIndex = (currentIndex + 1) % remaining.length;
      updateUI();
    }

    function prevCard() {
      const remaining = cards.filter(c => !knownSet.has(c.__backendId));
      if (remaining.length === 0) return;
      currentIndex = (currentIndex - 1 + remaining.length) % remaining.length;
      updateUI();
    }

    function markKnown() {
      const remaining = cards.filter(c => !knownSet.has(c.__backendId));
      if (remaining.length === 0) return;
      const card = remaining[currentIndex];
      knownSet.add(card.__backendId);
      if (currentIndex >= remaining.length - 1) currentIndex = 0;
      updateUI();
    }

    function resetProgress() {
      knownSet.clear();
      currentIndex = 0;
      updateUI();
    }

    async function seedDefaultCards() {
      if (cards.length >= 999) return;
      const defaults = [
        { idiom: '一帆風順', definition: '比喻事情進展順利，沒有阻礙。', example: '祝你新工作一帆風順！' },
        { idiom: '畫龍點睛', definition: '比喻在關鍵處加上精闢的話，使內容更生動。', example: '這篇文章的結尾真是畫龍點睛。' },
        { idiom: '守株待兔', definition: '比喻不知變通，死守舊法。', example: '做生意不能守株待兔，要主動出擊。' },
        { idiom: '亡羊補牢', definition: '比喻出了差錯後及時補救。', example: '雖然遲了，但亡羊補牢還來得及。' },
        { idiom: '塞翁失馬', definition: '比喻壞事有時反而變成好事。', example: '他失業後反而找到更好的工作，真是塞翁失馬。' }
      ];
      const btn = document.getElementById('seed-btn');
      btn.disabled = true;
      btn.textContent = '載入中...';
      for (const d of defaults) {
        await window.dataSdk.create(d);
      }
      btn.disabled = false;
      btn.textContent = '新增預設成語';
    }

    lucide.createIcons();
  </script>

</html>
